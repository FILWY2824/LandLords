syntax = "proto3";

package landlords.protocol;

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_INVALID_REQUEST = 1;
  ERROR_CODE_AUTH_FAILED = 2;
  ERROR_CODE_ALREADY_EXISTS = 3;
  ERROR_CODE_NOT_FOUND = 4;
  ERROR_CODE_MATCH_STATE_INVALID = 5;
  ERROR_CODE_GAME_STATE_INVALID = 6;
  ERROR_CODE_INTERNAL = 7;
}

enum MatchMode {
  MATCH_MODE_UNSPECIFIED = 0;
  MATCH_MODE_VS_BOT = 1;
  MATCH_MODE_PVP = 2;
}

enum BotDifficulty {
  BOT_DIFFICULTY_UNSPECIFIED = 0;
  BOT_DIFFICULTY_EASY = 1;
  BOT_DIFFICULTY_NORMAL = 2;
  BOT_DIFFICULTY_HARD = 3;
}

enum PlayerRole {
  PLAYER_ROLE_UNSPECIFIED = 0;
  PLAYER_ROLE_FARMER = 1;
  PLAYER_ROLE_LANDLORD = 2;
}

enum RoomPhase {
  ROOM_PHASE_UNSPECIFIED = 0;
  ROOM_PHASE_PREPARING = 1;
  ROOM_PHASE_WAITING = 2;
  ROOM_PHASE_PLAYING = 3;
  ROOM_PHASE_FINISHED = 4;
}

enum ActionType {
  ACTION_TYPE_UNSPECIFIED = 0;
  ACTION_TYPE_PLAY = 1;
  ACTION_TYPE_PASS = 2;
}

enum PatternType {
  PATTERN_TYPE_UNSPECIFIED = 0;
  PATTERN_TYPE_SINGLE = 1;
  PATTERN_TYPE_PAIR = 2;
  PATTERN_TYPE_TRIPLE = 3;
  PATTERN_TYPE_TRIPLE_WITH_SINGLE = 4;
  PATTERN_TYPE_TRIPLE_WITH_PAIR = 5;
  PATTERN_TYPE_STRAIGHT = 6;
  PATTERN_TYPE_STRAIGHT_PAIR = 7;
  PATTERN_TYPE_AIRPLANE = 8;
  PATTERN_TYPE_AIRPLANE_WITH_SINGLE = 9;
  PATTERN_TYPE_AIRPLANE_WITH_PAIR = 10;
  PATTERN_TYPE_BOMB = 11;
  PATTERN_TYPE_FOUR_WITH_TWO_SINGLES = 12;
  PATTERN_TYPE_FOUR_WITH_TWO_PAIRS = 13;
  PATTERN_TYPE_ROCKET = 14;
}

enum InvitationResult {
  INVITATION_RESULT_UNSPECIFIED = 0;
  INVITATION_RESULT_ACCEPTED = 1;
  INVITATION_RESULT_REJECTED = 2;
  INVITATION_RESULT_FAILED = 3;
  INVITATION_RESULT_EXPIRED = 4;
}

message UserProfile {
  string user_id = 1;
  string account = 2;
  string nickname = 3;
  int32 total_score = 4;
  int32 landlord_wins = 5;
  int32 landlord_games = 6;
  int32 farmer_wins = 7;
  int32 farmer_games = 8;
}

message OnlineUser {
  string user_id = 1;
  string account = 2;
  string nickname = 3;
  bool online = 4;
}

enum FriendRequestStatus {
  FRIEND_REQUEST_STATUS_UNSPECIFIED = 0;
  FRIEND_REQUEST_STATUS_PENDING = 1;
  FRIEND_REQUEST_STATUS_ACCEPTED = 2;
  FRIEND_REQUEST_STATUS_REJECTED = 3;
}

message FriendRequestEntry {
  string request_id = 1;
  string requester_user_id = 2;
  string requester_account = 3;
  string requester_nickname = 4;
  string receiver_user_id = 5;
  string receiver_account = 6;
  string receiver_nickname = 7;
  FriendRequestStatus status = 8;
  int64 created_at_ms = 9;
  int64 updated_at_ms = 10;
}

message FriendCenterSnapshot {
  repeated OnlineUser friends = 1;
  repeated FriendRequestEntry pending_requests = 2;
  repeated FriendRequestEntry history_requests = 3;
  int32 pending_request_count = 4;
}

message RegisterRequest {
  string nickname = 1;
  string account = 2;
  string password = 3;
}

message RegisterResponse {
  bool success = 1;
  string message = 2;
  UserProfile profile = 3;
}

message LoginRequest {
  string account = 1;
  string password = 2;
}

message LoginResponse {
  bool success = 1;
  string message = 2;
  UserProfile profile = 3;
  string session_token = 4;
}

message ResetPasswordRequest {
  string account = 1;
  string new_password = 2;
}

message ResetPasswordResponse {
  bool success = 1;
  string message = 2;
}

message UpdateNicknameRequest {
  string nickname = 1;
}

message UpdateNicknameResponse {
  bool success = 1;
  string message = 2;
  UserProfile profile = 3;
}

message MatchRequest {
  MatchMode mode = 1;
  BotDifficulty bot_difficulty = 2;
}

message CreateRoomRequest {}

message JoinRoomRequest {
  string room_code = 1;
}

message LeaveRoomRequest {
  string room_id = 1;
}

message RoomReadyRequest {
  string room_id = 1;
  bool ready = 2;
}

message AddBotRequest {
  string room_id = 1;
  BotDifficulty bot_difficulty = 2;
  int32 seat_index = 3;
}

message RemovePlayerRequest {
  string room_id = 1;
  string player_id = 2;
}

message ListFriendsRequest {}

message ListFriendsResponse {
  repeated OnlineUser users = 1;
  FriendCenterSnapshot snapshot = 2;
}

message AddFriendRequest {
  string account = 1;
}

message AddFriendResponse {
  bool success = 1;
  string message = 2;
  FriendRequestEntry request = 3;
  FriendCenterSnapshot snapshot = 4;
}

message RespondFriendRequestRequest {
  string request_id = 1;
  bool accept = 2;
}

message RespondFriendRequestResponse {
  bool success = 1;
  string message = 2;
  FriendRequestEntry request = 3;
  FriendCenterSnapshot snapshot = 4;
}

message DeleteFriendRequest {
  string friend_user_id = 1;
}

message DeleteFriendResponse {
  bool success = 1;
  string message = 2;
  FriendCenterSnapshot snapshot = 3;
}

message InvitePlayerRequest {
  string room_id = 1;
  string invitee_account = 2;
  int32 seat_index = 3;
}

message InvitePlayerResponse {
  bool accepted = 1;
  string message = 2;
}

message RoomInvitationPush {
  string invitation_id = 1;
  string room_id = 2;
  string room_code = 3;
  string inviter_user_id = 4;
  string inviter_account = 5;
  string inviter_nickname = 6;
  int32 seat_index = 7;
}

message RespondRoomInvitationRequest {
  string invitation_id = 1;
  bool accept = 2;
}

message RespondRoomInvitationResponse {
  bool success = 1;
  string message = 2;
  RoomSnapshot snapshot = 3;
}

message RoomInvitationResultPush {
  string invitation_id = 1;
  InvitationResult result = 2;
  string invitee_user_id = 3;
  string invitee_account = 4;
  string invitee_nickname = 5;
  string message = 6;
}

message FriendCenterPush {
  FriendCenterSnapshot snapshot = 1;
}

message MatchResponse {
  bool accepted = 1;
  string message = 2;
}

message MatchFoundPush {
  string room_id = 1;
  MatchMode mode = 2;
  repeated RoomPlayer players = 3;
}

message RoomPlayer {
  string player_id = 1;
  string display_name = 2;
  bool is_bot = 3;
  PlayerRole role = 4;
  int32 cards_left = 5;
  int32 round_score = 6;
  int32 seat_index = 7;
  bool ready = 8;
  bool occupied = 9;
}

message Card {
  string id = 1;
  string rank = 2;
  string suit = 3;
  int32 value = 4;
}

message CardCounterEntry {
  string rank = 1;
  int32 remaining = 2;
}

message TableAction {
  string action_id = 1;
  string player_id = 2;
  ActionType action_type = 3;
  repeated Card cards = 4;
  string pattern = 5;
  int64 timestamp_ms = 6;
  PatternType pattern_type = 7;
}

message RoomSnapshot {
  string room_id = 1;
  RoomPhase phase = 2;
  MatchMode mode = 3;
  repeated RoomPlayer players = 4;
  repeated Card self_cards = 5;
  repeated Card landlord_cards = 6;
  repeated TableAction recent_actions = 7;
  string current_turn_player_id = 8;
  string status_text = 9;
  repeated CardCounterEntry card_counter = 10;
  int32 base_score = 11;
  int32 multiplier = 12;
  int32 current_round_score = 13;
  bool spring_triggered = 14;
  int32 turn_serial = 15;
  string room_code = 16;
  string owner_player_id = 17;
}

message PlayCardsRequest {
  string room_id = 1;
  repeated string card_ids = 2;
}

message PassRequest {
  string room_id = 1;
}

message ReconnectRequest {
  string room_id = 1;
}

message HeartbeatRequest {
  int64 client_time_ms = 1;
}

message HeartbeatResponse {
  int64 server_time_ms = 1;
}

message OperationResponse {
  bool success = 1;
  string message = 2;
  RoomSnapshot snapshot = 3;
}

message ErrorResponse {
  ErrorCode code = 1;
  string message = 2;
}

message ClientMessage {
  string request_id = 1;
  string session_token = 2;
  oneof payload {
    RegisterRequest register_request = 10;
    LoginRequest login_request = 11;
    MatchRequest match_request = 12;
    PlayCardsRequest play_cards_request = 13;
    PassRequest pass_request = 14;
    ReconnectRequest reconnect_request = 15;
    HeartbeatRequest heartbeat_request = 16;
    ResetPasswordRequest reset_password_request = 17;
    CreateRoomRequest create_room_request = 18;
    JoinRoomRequest join_room_request = 19;
    RoomReadyRequest room_ready_request = 20;
    AddBotRequest add_bot_request = 21;
    RemovePlayerRequest remove_player_request = 22;
    ListFriendsRequest list_friends_request = 23;
    AddFriendRequest add_friend_request = 24;
    InvitePlayerRequest invite_player_request = 25;
    RespondRoomInvitationRequest respond_room_invitation_request = 26;
    LeaveRoomRequest leave_room_request = 27;
    UpdateNicknameRequest update_nickname_request = 28;
    RespondFriendRequestRequest respond_friend_request_request = 29;
    DeleteFriendRequest delete_friend_request = 30;
  }
}

message ServerMessage {
  string request_id = 1;
  oneof payload {
    RegisterResponse register_response = 10;
    LoginResponse login_response = 11;
    MatchResponse match_response = 12;
    MatchFoundPush match_found_push = 13;
    RoomSnapshot room_snapshot = 14;
    OperationResponse operation_response = 15;
    ErrorResponse error_response = 16;
    HeartbeatResponse heartbeat_response = 17;
    ResetPasswordResponse reset_password_response = 18;
    ListFriendsResponse list_friends_response = 19;
    AddFriendResponse add_friend_response = 20;
    InvitePlayerResponse invite_player_response = 21;
    RoomInvitationPush room_invitation_push = 22;
    RespondRoomInvitationResponse respond_room_invitation_response = 23;
    RoomInvitationResultPush room_invitation_result_push = 24;
    UpdateNicknameResponse update_nickname_response = 25;
    RespondFriendRequestResponse respond_friend_request_response = 26;
    DeleteFriendResponse delete_friend_response = 27;
    FriendCenterPush friend_center_push = 28;
  }
}
